name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行原生 Python 优选
        run: |
          # 使用 cat 写入 python 脚本，避免 EOF 内部转义问题
          cat << 'EOF' > scanner.py
          import socket
          import time
          
          # 2026 常用 WARP IP 段测试点
          targets = [
              "162.159.192.1", "162.159.193.1", "162.159.195.1", 
              "188.114.96.1", "188.114.97.1", "188.114.98.1", "188.114.99.1"
          ]
          results = []
          
          print("开始探测节点延迟...")
          for ip in targets:
              try:
                  start = time.time()
                  # 使用 TCP 握手测试 2408 端口
                  with socket.create_connection((ip, 2408), timeout=1.0) as sock:
                      latency = (time.time() - start) * 1000
                      results.append((f"{ip}:2408", latency))
                      print(f"节点 {ip} 延迟: {latency:.2f}ms")
              except Exception:
                  continue
          
          # 按延迟从低到高排序
          results.sort(key=lambda x: x[1])
          best_ips = [r[0] for r in results[:5]]
          
          # 将结果写入文件供下一步使用
          with open("best_ips.txt", "w") as f:
              f.write(",".join(best_ips) if best_ips else "162.159.193.10:2408")
          EOF
          
          # 运行 Python 脚本
          python3 scanner.py
          
          # 读取结果到 GitHub 环境变量
          BEST_IPS=$(cat best_ips.txt)
          echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
          echo "最终优选 IP 列表: $BEST_IPS"

      - name: 同步到 Cloudflare Worker
        run: |
          # 检查变量是否为空
          if [ -z "${{ env.BEST_IPS }}" ]; then echo "未获取到 IP"; exit 1; fi
          
          # 使用你在 Secrets 设置的变量同步
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步指令已发送成功"
