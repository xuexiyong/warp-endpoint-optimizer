name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Python 测速
        id: scanner
        shell: python
        run: |
          import socket
          import time
          import os

          # WARP 官方常用 IP 测试点
          targets = ["162.159.192.1", "162.159.193.1", "162.159.195.1", "188.114.96.1", "188.114.97.1"]
          results = []

          print("开始探测节点...")
          for ip in targets:
              try:
                  start = time.time()
                  # TCP 握手测试 2408 端口
                  with socket.create_connection((ip, 2408), timeout=1.0) as sock:
                      latency = (time.time() - start) * 1000
                      results.append(f"{ip}:2408")
                      print(f"节点 {ip} 响应成功")
              except:
                  continue
          
          # 如果测速全部失败，提供保底 IP
          final_ips = ",".join(results[:5]) if results else "162.159.193.10:2408"
          
          # 将结果写入 GitHub 环境变量
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"BEST_IPS={final_ips}\n")

      - name: 同步到 Cloudflare Worker
        run: |
          # 检查变量是否成功获取
          if [ -z "${{ env.BEST_IPS }}" ]; then echo "未获取到 IP"; exit 1; fi
          
          # 执行同步命令 (使用你 Secrets 里的三个变量)
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步完成"
