name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行 Python 优选脚本
        id: scanner
        run: |
          # 直接在 Actions 运行 Python 测速，不依赖任何外部工具下载
          python3 - <<EOF > best_ips.txt
          import socket
          import time
          
          # WARP 官方 IP 段
          targets = ["162.159.192.1", "162.159.193.1", "162.159.195.1", "188.114.96.1", "188.114.97.1"]
          results = []
          
          for ip in targets:
              try:
                  start = time.time()
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(1.0)
                  s.connect((ip, 2408))
                  latency = (time.time() - start) * 1000
                  results.append((f"{ip}:2408", latency))
                  s.close()
              except:
                  continue
          
          # 按延迟排序
          results.sort(key=lambda x: x[1])
          best = [r[0] for r in results[:5]]
          print(",".join(best))
          EOF
          
          BEST_IPS=\$(cat best_ips.txt)
          if [ -z "\$BEST_IPS" ]; then BEST_IPS="162.159.193.10:2408"; fi
          echo "BEST_IPS=\$BEST_IPS" >> \$GITHUB_ENV
          echo "筛选结果: \$BEST_IPS"

      - name: 同步到 Cloudflare Worker
        run: |
          # 使用你 Secrets 里的三个变量
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步完成"
