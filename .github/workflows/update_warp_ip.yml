name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次
  workflow_dispatch:       # 支持手动点击运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行优选工具
        run: |
          # 1. 下载真正的二进制优选程序 (GitLab 镜像比 GitHub Raw 更稳定)
          wget -O warp https://gitlab.com/Misaka-blog/warp-script/-/raw/main/files/warp-linux-amd64
          
          # 检查文件大小，确保不是下载到了 HTML (应该在 10MB 左右)
          ls -lh warp
          chmod +x warp
          
          # 2. 运行优选 (针对中国优化，扫描 100 个节点)
          # 执行后会生成 result.csv
          ./warp -n 100 -t 4
          
          # 3. 提取前 5 个最快的 IP:Port
          if [ -f "result.csv" ]; then
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "成功选出 IP: $BEST_IPS"
          else
            echo "错误：未生成结果文件"
            exit 1
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 使用你在 Secrets 中定义的变量
          # 动态更新 Worker 中的 WARP_IPS 环境变量
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步完成，目标 Worker: ${{ secrets.CF_WORKER_NAME }}"
