name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行优选工具
        run: |
          # 1. 给主脚本权限
          chmod +x ./warp_optimizer.sh
          
          # 2. 该脚本内部会根据架构下载工具，我们模拟输入 1 (IPv4)
          # 注意：该脚本执行完后会在当前目录生成 result.csv
          printf "1\n" | bash ./warp_optimizer.sh
          
          # 3. 验证并提取结果
          # 根据该脚本调用的工具特性，结果通常保存在 result.csv
          if [ -f "result.csv" ]; then
            # 提取前 5 个最快 IP (格式通常为 IP:Port, 位于第一列)
            # 使用 awk 排除第一行表头，并取第一列
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
          else
            echo "错误：未生成 result.csv"
            # 尝试查找脚本可能下载的其他临时结果文件
            BEST_IPS=$(ls | grep -E "[0-9]{1,3}\." | head -n 1 || echo "")
          fi

          if [ -z "$BEST_IPS" ]; then
            echo "无法获取有效 IP，使用保底值"
            BEST_IPS="162.159.193.10:2408,162.159.192.10:500"
          fi
          
          echo "最终优选 IP 列表: $BEST_IPS"
          echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV

      - name: 同步到 Cloudflare Worker
        run: |
          # 确保这里的 warp-endpoint-ip 与你创建的 Worker 名称一致
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/warp-endpoint-ip/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
