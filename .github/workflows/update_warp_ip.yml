name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Python 测速
        id: scanner
        shell: python
        run: |
          import socket
          import time
          import os

          # 直接定义测试目标，不下载任何外部文件
          targets = ["162.159.192.1", "162.159.193.1", "162.159.195.1", "188.114.96.1", "188.114.97.1"]
          results = []

          print("开始探测 WARP 节点...")
          for ip in targets:
              try:
                  start = time.time()
                  # 使用原生 socket 测试 2408 端口
                  with socket.create_connection((ip, 2408), timeout=1.0) as sock:
                      latency = (time.time() - start) * 1000
                      results.append(f"{ip}:2408")
                      print(f"节点 {ip} 响应成功，延迟: {latency:.2f}ms")
              except Exception:
                  continue
          
          # 如果测速全部失败，提供一个保底 IP
          final_ips = ",".join(results[:5]) if results else "162.159.193.10:2408"
          
          # 关键一步：将结果直接写入 GitHub 的环境变量文件
          env_file = os.getenv('GITHUB_ENV')
          with open(env_file, "a") as f:
              f.write(f"BEST_IPS={final_ips}\n")
          print(f"优选结果已存入环境变量: {final_ips}")

      - name: 同步到 Cloudflare Worker
        run: |
          # 这一步使用正常的 Bash，只需确保变量存在
          if [ -z "${{ env.BEST_IPS }}" ]; then
            echo "错误：未获取到优选 IP"
            exit 1
          fi

          # 使用你 Secrets 里的三个变量：CF_ACCOUNT_ID, CF_API_TOKEN, CF_WORKER_NAME
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步指令已发送成功！"
