name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: 编译优选工具
        run: |
          # 直接从源码安装，不依赖二进制下载
          go install github.com/P3TERX/Cloudflare-IP-Speedtest@latest
          # 找到安装后的可执行文件路径
          cp $(go env GOPATH)/bin/Cloudflare-IP-Speedtest ./CloudflareST
          echo "工具编译完成"

      - name: 执行优选扫描
        run: |
          # 生成扫描目标段
          cat <<EOF > ip.txt
          162.159.192.0/24
          162.159.193.0/24
          188.114.96.0/24
          188.114.97.0/24
          EOF
          
          # 运行扫描：使用 -url 确保测试真实性
          ./CloudflareST -tp 2408 -f ip.txt -n 500 -o result.csv
          
          if [ -f "result.csv" ]; then
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
          else
            echo "BEST_IPS=162.159.193.10:2408,162.159.192.10:500" >> $GITHUB_ENV
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 发送 PUT 请求更新环境变量
          # 使用你的三个 Secrets：CF_ACCOUNT_ID, CF_API_TOKEN, CF_WORKER_NAME
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步指令已发送成功"
