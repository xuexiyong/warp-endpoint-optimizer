name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 解决你看到的 Node.js 20 警告，强制使用 Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 尽管有警告，v4 依然是目前最稳定的版本

      - name: 运行优选工具
        run: |
          # 1. 给仓库里的主脚本权限
          if [ -f "./warp_optimizer.sh" ]; then
            chmod +x ./warp_optimizer.sh
            # 2. 模拟输入 1 选择 IPv4 优选。注意：该脚本会自动下载 binary
            printf "1\n" | bash ./warp_optimizer.sh
          else
            echo "错误：找不到 warp_optimizer.sh，请检查仓库文件！"
            exit 1
          fi
          
          # 3. 提取结果。该库底层通常使用 CloudflareUtils，生成 result.csv
          # 我们取前 5 个最快的 IP:Port
          if [ -f "result.csv" ]; then
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
          else
            echo "未生成 result.csv，尝试寻找其他输出..."
            # 兜底：如果脚本直接输出了 IP 列表
            BEST_IPS=$(grep -oE "[0-9]{1,3}(\.[0-9]{1,3}){3}:[0-9]+" *.txt | head -n 5 | tr '\n' ',' | sed 's/,$//' || echo "")
          fi

          if [ -z "$BEST_IPS" ]; then
            BEST_IPS="162.159.193.10:2408,162.159.192.10:500"
          fi
          
          echo "今日优选: $BEST_IPS"
          echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV

      - name: 同步到 Cloudflare Worker
        run: |
          # 发送给你的 Worker (warp-endpoint-ip)
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/warp-endpoint-ip/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
