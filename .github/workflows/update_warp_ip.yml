name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载并运行优选工具
        run: |
          # 1. 下载 CloudflareST (直接指向编译好的二进制文件压缩包)
          # 使用 -L 强制跟随重定向，这是之前失败的关键
          curl -L -o cfst.tar.gz "https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz"
          
          # 2. 解压并赋予权限
          tar -zxf cfst.tar.gz
          chmod +x CloudflareST
          echo "工具准备完成"

      - name: 执行优选扫描
        run: |
          # 3. 生成扫描目标 (WARP 官方常用段)
          cat <<EOF > ip.txt
          162.159.192.0/24
          162.159.193.0/24
          188.114.96.0/24
          188.114.97.0/24
          EOF
          
          # 4. 开始扫描
          ./CloudflareST -tp 2408 -f ip.txt -n 500 -o result.csv
          
          # 5. 提取前 5 个最快的 IP:Port
          if [ -f "result.csv" ]; then
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "选出的 IP: $BEST_IPS"
          else
            echo "扫描失败，使用保底值"
            echo "BEST_IPS=162.159.193.10:2408" >> $GITHUB_ENV
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 6. 使用你的三个 Secrets 同步到 Cloudflare
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步完成"
