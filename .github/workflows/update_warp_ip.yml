name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 环境准备与工具下载
        run: |
          # 使用 -L 参数跟随重定向，确保下到的是真正的压缩包
          curl -L -o CloudflareST.tar.gz "https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz"
          
          # 验证文件是否下载成功（检查大小）
          if [ $(stat -c%s "CloudflareST.tar.gz") -lt 1000000 ]; then
            echo "文件下载不完整，尝试备用源..."
            curl -L -o CloudflareST.tar.gz "https://gh-proxy.com/https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz"
          fi
          
          tar -zxf CloudflareST.tar.gz
          chmod +x CloudflareST
          echo "工具准备就绪"

      - name: 执行优选扫描
        run: |
          # 扫描常用的 WARP IP 段，这里直接指定 IP 段防止脚本去远程拉取配置导致 404
          # ip.txt 内容直接生成
          cat <<EOF > ip.txt
          162.159.192.0/24
          162.159.193.0/24
          162.159.195.0/24
          188.114.96.0/24
          188.114.97.0/24
          188.114.98.0/24
          188.114.99.0/24
          EOF
          
          # 运行扫描: -tp 端口, -f 指定文件, -n 并发, -o 输出
          ./CloudflareST -tp 2408 -f ip.txt -n 500 -o result.csv
          
          if [ -f "result.csv" ]; then
            # 提取前 5 个最快 IP:Port
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "筛选出的 IP: $BEST_IPS"
          else
            echo "扫描失败，使用保底 IP"
            echo "BEST_IPS=162.159.193.10:2408,162.159.192.10:500" >> $GITHUB_ENV
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 使用你配置的三个 Secrets 变量
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步完成"
