name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动运行一次
  workflow_dispatch:       # 支持手动触发按钮

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载并运行优选工具
        run: |
          # 下载适合 Linux 的优选工具 (根据项目实际文件名调整)
          # 这里以该项目常见的 ip.sh 或 binary 为例
          chmod +x ./ip.sh
          # 运行扫描 (假设工具支持非交互模式，扫描出最快的 IP)
          # 注意：部分工具可能需要修改以适应自动运行，这里演示逻辑
          # 我们直接使用项目自带的扫描逻辑获取 result.csv
          bash ./ip.sh <<EOF
          1
          EOF
          
          # 提取前 5 个最快的 IP 并转换成逗号分隔的字符串
          # 假设结果在 result.csv 中，格式为 IP:Port,Latency
          if [ -f "result.csv" ]; then
            BEST_IPS=$(grep -oE "[0-9]{1,3}(\.[0-9]{1,3}){3}:[0-9]+" result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
          else
            # 如果没有 result.csv，尝试从 log 或其他输出获取
            BEST_IPS="162.159.193.10:2408,162.159.192.10:500"
          fi
          echo "筛选出的优选 IP: $BEST_IPS"
          echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV

      - name: 同步到 Cloudflare Worker
        run: |
          # 使用 Cloudflare API 更新 Worker 的环境变量 WARP_IPS
          # 这会将最新的 IP 列表推送到你的 warp-endpoint-ip Worker 中
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/warp-endpoint-ip/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步成功！"
