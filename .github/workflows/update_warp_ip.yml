name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  # 解决 Node.js 版本警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行优选工具
        run: |
          # 1. 下载核心优选工具 (绕过脚本的系统权限限制)
          wget -O warp https://github.com/Misaka-blog/warp-script/raw/main/files/warp-linux-amd64
          chmod +x warp
          
          # 2. 执行优选扫描 (扫描100个IP，获取最快的)
          # 执行完后会生成 result.csv
          ./warp -n 100 -t 4
          
          # 3. 提取结果并存入环境变量
          if [ -f "result.csv" ]; then
            # 提取前 5 个最快的 IP:Port
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "成功筛选 IP: $BEST_IPS"
          else
            echo "扫描失败，未能生成 result.csv"
            exit 1
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 使用你设置的三个变量进行 API 调用
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步指令已发送到 Worker: ${{ secrets.CF_WORKER_NAME }}"
