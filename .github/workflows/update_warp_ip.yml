name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 环境准备与工具安装
        run: |
          # 1. 放弃 curl 下载，直接使用系统自带的 go 从源码安装工具
          # 这样不经过 Release 页面，100% 不会被拦截为机器人
          go install github.com/P3TERX/Cloudflare-IP-Speedtest@latest
          
          # 2. 将编译好的程序移动到当前目录
          cp $(go env GOPATH)/bin/Cloudflare-IP-Speedtest ./CloudflareST
          chmod +x CloudflareST
          echo "工具安装成功，版本信息："
          ./CloudflareST -v

      - name: 执行优选扫描
        run: |
          # 3. 手动生成扫描 IP 段，不依赖远程文件
          printf "162.159.192.0/24\n162.159.193.0/24\n188.114.96.0/24\n188.114.97.0/24\n" > ip.txt
          
          # 4. 运行扫描 (针对 WARP 端口 2408)
          # -n 500: 并发数, -o: 输出文件
          ./CloudflareST -tp 2408 -f ip.txt -n 500 -o result.csv
          
          # 5. 提取前 5 个最快的 IP:Port
          if [ -s "result.csv" ]; then
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "成功筛选结果: $BEST_IPS"
          else
            echo "扫描未产生有效结果"
            exit 1
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 6. 使用你在 Secrets 填写的三个变量：CF_ACCOUNT_ID, CF_API_TOKEN, CF_WORKER_NAME
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
