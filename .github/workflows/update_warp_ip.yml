name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 环境准备与工具下载
        run: |
          # 1. 换成更直接、带 UA 伪装的下载方式，确保不被 GitHub 拦截为机器人
          curl -H "User-Agent: Mozilla/5.0" -L -o CloudflareST.tar.gz "https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz"
          
          # 2. 检查文件类型，如果不是 gzip 格式直接报错，不再盲目执行下一步
          if ! file CloudflareST.tar.gz | grep -q "gzip compressed data"; then
            echo "下载失败：获取到的不是压缩包文件，尝试备用源..."
            curl -H "User-Agent: Mozilla/5.0" -L -o CloudflareST.tar.gz "https://gh-proxy.com/https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz"
          fi
          
          # 3. 解压
          tar -zxf CloudflareST.tar.gz
          chmod +x CloudflareST
          echo "工具准备就绪"

      - name: 执行优选扫描
        run: |
          # 4. 生成扫描段
          printf "162.159.192.0/24\n162.159.193.0/24\n188.114.96.0/24\n188.114.97.0/24\n" > ip.txt
          
          # 5. 运行扫描 (针对 WARP 端口 2408)
          ./CloudflareST -tp 2408 -f ip.txt -n 500 -o result.csv
          
          # 6. 提取前 5 个最快的 IP:Port
          if [ -s "result.csv" ]; then
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "成功筛选: $BEST_IPS"
          else
            echo "未生成有效结果，停止同步"
            exit 1
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 7. 使用你的三个 Secrets：CF_ACCOUNT_ID, CF_API_TOKEN, CF_WORKER_NAME
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
