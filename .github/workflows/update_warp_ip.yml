name: 自动优选 WARP IP 并同步到 CF
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载优选工具 (多源备份)
        run: |
          # 尝试多个下载源，确保不会 404
          URLS=(
            "https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/latest/download/CloudflareST_linux_amd64.tar.gz"
            "https://ghproxy.net/https://github.com/P3TERX/Cloudflare-IP-Speedtest/releases/latest/download/CloudflareST_linux_amd64.tar.gz"
          )
          
          for url in "${URLS[@]}"; do
            echo "尝试下载: $url"
            if wget -qO CloudflareST.tar.gz "$url"; then
              tar -zxf CloudflareST.tar.gz && chmod +x CloudflareST && echo "下载成功！" && break
            fi
          done
          
          if [ ! -f "./CloudflareST" ]; then
            echo "错误：所有下载源均失效！"
            exit 1
          fi

      - name: 执行优选扫描
        run: |
          # 扫描 Cloudflare 的常用 WARP IP 段
          # -tp 2408: WARP 默认端口, -url: 测试延迟的地址, -n 500: 并发数
          ./CloudflareST -tp 2408 -url https://api.cloudflare.com/cdn-cgi/trace -n 500 -o result.csv
          
          if [ -f "result.csv" ]; then
            # 提取前 5 个最快的 IP:Port (CloudflareST 的结果第一列就是 IP:Port)
            BEST_IPS=$(awk -F, 'NR>1 {print $1}' result.csv | head -n 5 | tr '\n' ',' | sed 's/,$//')
            echo "BEST_IPS=$BEST_IPS" >> $GITHUB_ENV
            echo "筛选结果: $BEST_IPS"
          else
            echo "扫描失败，使用保底值"
            echo "BEST_IPS=162.159.193.10:2408,162.159.192.10:500" >> $GITHUB_ENV
          fi

      - name: 同步到 Cloudflare Worker
        run: |
          # 使用你配置的三个 Secrets 变量
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.CF_WORKER_NAME }}/bindings" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data "[{\"name\":\"WARP_IPS\",\"type\":\"plain_text\",\"text\":\"${{ env.BEST_IPS }}\"}]"
          echo "同步指令已发送！"
